name: PowerShell validation

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '34 23 * * 0'

permissions:
  contents: read

jobs:
  windows-powershell-51:
    name: Windows PowerShell 5.1
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manifest, parser baseline, import, and platform exports
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          if ($PSVersionTable.PSEdition -ne 'Desktop' -or $PSVersionTable.PSVersion.ToString() -notlike '5.1*') {
              throw "Expected Windows PowerShell 5.1; detected $($PSVersionTable.PSEdition) $($PSVersionTable.PSVersion)."
          }

          $manifestPath = Join-Path $PWD 'src/Keldor/Keldor.psd1'
          Test-ModuleManifest -Path $manifestPath | Out-Null
          $sharedFiles = Get-ChildItem ./src/Keldor -File -Include *.ps1, *.psm1, *.psd1
          $sharedFiles += Get-ChildItem ./src/Keldor/Private/Common -File -Filter *.ps1
          $sharedFiles += Get-ChildItem ./src/Keldor/Public/Common -File -Filter *.ps1
          foreach ($file in $sharedFiles) {
              $tokens = $null
              $errors = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile(
                  $file.FullName,
                  [ref]$tokens,
                  [ref]$errors
              )
              if ($errors) {
                  throw "Windows PowerShell 5.1 parser errors in '$($file.FullName)': $($errors -join '; ')"
              }
          }

          $output = @(Import-Module $manifestPath -Force -PassThru:$false)
          if ($output.Count -ne 0) { throw 'Module import wrote to the success stream.' }
          if ((Get-KeldorPlatform) -ne 'Windows') { throw 'Desktop edition did not resolve to Windows.' }
          if (-not (Get-Command Format-IPList -Module Keldor -ErrorAction SilentlyContinue)) {
              throw 'A Common command was not exported.'
          }
          if (-not (Get-Command Get-WSToolsVersion -Module Keldor -ErrorAction SilentlyContinue)) {
              throw 'A Windows command was not exported.'
          }

  powershell-76:
    name: PowerShell 7.6 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Require PowerShell 7.6 LTS
        shell: pwsh
        run: |
          if ($PSVersionTable.PSVersion.Major -ne 7 -or $PSVersionTable.PSVersion.Minor -ne 6) {
              throw "Expected PowerShell 7.6; detected $($PSVersionTable.PSVersion)."
          }

      - name: Install development test modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.7 -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -MinimumVersion 1.24 -Scope CurrentUser -Force

      - name: Build and test
        shell: pwsh
        run: |
          ./build.ps1 -Task Build
          Invoke-Pester ./src/Keldor/Tests -CI

      - name: Analyze shared and loader code
        if: matrix.os == 'ubuntu-latest'
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./src/Keldor -Recurse -Settings ./PSScriptAnalyzerSettings.psd1
          $results | Format-Table -AutoSize
          if ($results) { throw "PSScriptAnalyzer reported $($results.Count) issue(s)." }

  supported-core-lines:
    name: PowerShell ${{ matrix.version }} import
    strategy:
      fail-fast: false
      matrix:
        version: ['7.4', '7.5', '7.6']
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/powershell:${{ matrix.version }}-ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate supported Core line
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $expected = [version]'${{ matrix.version }}'
          if (
              $PSVersionTable.PSVersion.Major -ne $expected.Major -or
              $PSVersionTable.PSVersion.Minor -ne $expected.Minor
          ) {
              throw "Expected PowerShell $expected; detected $($PSVersionTable.PSVersion)."
          }
          Test-ModuleManifest ./src/Keldor/Keldor.psd1 | Out-Null
          Import-Module ./src/Keldor/Keldor.psd1 -Force -ErrorAction Stop
          if (-not (Get-Command Get-KeldorPlatform -Module Keldor)) {
              throw 'Keldor did not export its platform foundation command.'
          }
