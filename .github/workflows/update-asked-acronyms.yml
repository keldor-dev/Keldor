name: Update asked acronyms

on:
  push:
    paths:
      - '.github/workflows/update-asked-acronyms.yml'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update acronym catalog
        shell: pwsh
        run: ./tools/Update-AskedAcronyms.ps1

      - name: Remove one-time updater
        shell: bash
        run: |
          rm -f tools/Update-AskedAcronyms.ps1
          rm -f .github/workflows/update-asked-acronyms.yml

      - name: Commit updated catalog
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No catalog changes were required.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/Keldor/Resources/Acronyms.json tools/Update-AskedAcronyms.ps1 .github/workflows/update-asked-acronyms.yml
          git commit -m 'Add previously requested acronyms'
          git push
